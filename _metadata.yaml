author: "rkskmt"
lang: ja
format:
  clean-revealjs:
    width: 1280
    height: 720
    margin: 0.06
    html-math-method:
      method: mathjax
      url: "./libs/mathjax/MathJax.js?config=TeX-AMS_HTML-full"
    highlight-style: github
    scrollable: true
    menu: false
    footer: " "
    theme:
      - default
    include-in-header:
      text: |
        <link rel="stylesheet" href="custom.css">
        <script src="slide-ui.js" defer></script>
        <script src="search-ui.js" defer></script>
mermaid:
  theme: default
  flowchart:
    nodeSpacing: 10
    rankSpacing: 15
filters:
  - slide-body.lua
  - hl.lua
  - fw-colon.lua
  - cite-image.lua
  - plotly-iframe.lua
  - lightbox
lightbox: auto
